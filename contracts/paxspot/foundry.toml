[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "shanghai"

# Allow deploy scripts to write address files
fs_permissions = [{ access = "read-write", path = "scripts/" }]

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
